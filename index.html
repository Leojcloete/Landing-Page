<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origin Path: Odyssey™ — Coming Soon</title>
    <style>
        :root {
            --deep-space: #0b0d17;
            --origin-glow: #ff7e5f;
            --odyssey-glow: #00c6ff;
            --accent-purple: #7b2cbf;
            --accent-gold: #f4d35e;
            --text-light: #f8f9fa;
            --text-muted: rgba(248, 249, 250, 0.75);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            color-scheme: dark;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-light);
            background: var(--deep-space);
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        /* 3D animated background layers */
        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            perspective: 1200px;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, rgba(255, 126, 95, 0.18), transparent 45%),
                        radial-gradient(circle at 80% 70%, rgba(0, 198, 255, 0.18), transparent 45%),
                        radial-gradient(circle at 50% 50%, rgba(123, 44, 191, 0.12), transparent 60%),
                        var(--deep-space);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.7;
            animation: float 18s ease-in-out infinite;
        }

        .orb-origin {
            width: 45vw;
            height: 45vw;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle at 30% 30%, var(--origin-glow), var(--accent-purple));
            top: 10%;
            left: -5%;
            animation-delay: 0s;
        }

        .orb-odyssey {
            width: 50vw;
            height: 50vw;
            max-width: 700px;
            max-height: 700px;
            background: radial-gradient(circle at 70% 70%, var(--odyssey-glow), var(--accent-purple));
            bottom: 5%;
            right: -10%;
            animation-delay: -9s;
        }

        .orb-gold {
            width: 25vw;
            height: 25vw;
            max-width: 320px;
            max-height: 320px;
            background: radial-gradient(circle, var(--accent-gold), transparent 70%);
            top: 40%;
            left: 40%;
            opacity: 0.35;
            animation-delay: -4s;
            animation-duration: 22s;
        }

        @keyframes float {
            0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
            25% { transform: translate3d(4%, -6%, 80px) rotate(8deg); }
            50% { transform: translate3d(-3%, 5%, -60px) rotate(-5deg); }
            75% { transform: translate3d(6%, 3%, 40px) rotate(4deg); }
        }

        /* Subtle starfield */
        .stars {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.35), transparent),
                radial-gradient(1.5px 1.5px at 80% 10%, rgba(255,255,255,0.25), transparent),
                radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 90% 60%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,0.15), transparent);
            background-size: 100% 100%;
            opacity: 0.6;
        }

        /* Content card */
        .content {
            position: relative;
            z-index: 1;
            max-width: 760px;
            width: 100%;
            padding: clamp(2rem, 5vh, 3.5rem) clamp(1.75rem, 5vw, 3.5rem);
            border-radius: 28px;
            background: rgba(11, 13, 23, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transform-style: preserve-3d;
            animation: cardEntry 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(40px) rotateX(10deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        .brand {
            display: block;
            margin-bottom: clamp(1rem, 2.5vh, 1.5rem);
            font-size: clamp(0.85rem, 2vw, 1rem);
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            text-align: center;
            color: var(--text-muted);
        }

        h1 {
            font-size: clamp(2.2rem, 6vh, 4.2rem);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.03em;
            margin-bottom: clamp(0.85rem, 2vh, 1.25rem);
            color: var(--text-light);
        }

        h1 span {
            display: block;
            color: var(--odyssey-glow);
            padding-bottom: 0.15em;
        }

        p {
            font-size: clamp(1rem, 2.2vh, 1.25rem);
            line-height: 1.65;
            color: var(--text-muted);
            max-width: 560px;
            margin: 0 auto clamp(1.5rem, 3vh, 2.25rem);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1.4rem;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .status::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-gold);
            box-shadow: 0 0 12px var(--accent-gold);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        /* Responsive tweaks */
        @media (max-width: 480px) {
            body {
                padding: 1.25rem;
            }

            .content {
                border-radius: 22px;
                padding: 2rem 1.5rem;
            }

            .brand {
                letter-spacing: 0.12em;
            }
        }
    </style>
</head>
<body>
    <div class="background" aria-hidden="true">
        <div class="stars"></div>
        <div class="orb orb-origin"></div>
        <div class="orb orb-odyssey"></div>
        <div class="orb orb-gold"></div>
    </div>

    <main class="content">
        <div class="brand">Origin Path: Odyssey™</div>
        <h1>Something Extraordinary <span>Is Taking Shape</span></h1>
        <p>We're building the next chapter of Origin Path: Odyssey™. This space is currently under construction, but the journey ahead is worth the wait.</p>
        <div class="status">In Development</div>
    </main>
</body>
</html>
